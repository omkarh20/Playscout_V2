services:

  backend:
    build: ./backend
    container_name: playscout-backend
    ports:
      - "8080:8080"
    restart: always
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: playscout-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend